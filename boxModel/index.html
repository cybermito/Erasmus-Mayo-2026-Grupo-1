<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Model</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Box Model</h1>

    <!-- Box model visual -->
    <div class="box-model">
      <div class="content">CONTENT</div>
    </div>

    <!-- Comparación -->
    <h2>Content-box vs border-box</h2>

    <div class="content-box">Content-box (default) width = contenido.</div>
    <div class="border-box">
      Border-box width = contenido + padding + border.
    </div>

    <!-- Padding vs margin -->
    <h2>Padding vs margin</h2>
    <div class="only-padding">Solo padding (espacio interior)</div>
    <div class="only-margin">Solo margin (espacio exterior)</div>
  </body>
</html>
