<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tipos de selectores</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Tipos de selectores</h1>

    <!-- Selectores de elemento -->
    <p>Selector de elemento (p)</p>
    <div>Selector de elemento (div)</div>

    <!-- Selectores de clase -->
    <p class="rojo">Selector de clase (.rojo)</p>
    <p class="grande">Selector de clase (.grande)</p>
    <p class="rojo grande">Dos clases a la vez</p>

    <!-- Selector de ID -->
    <p id="unico">Selector de id (#unico)</p>

    <!-- Selectores descencientes -->
    <div class="container">
      <p>Hijo directo</p>
      <div>
        <p>Descenciente anidado</p>
      </div>
    </div>
  </body>
</html>
